<!DOCTYPE html>
<html>

<head>

<title>CivicTrack Dashboard</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="navbar">

<div class="logo">CivicTrack</div>

<header class="navbar">


<nav>

<a href="index.html">Home</a>
<a href="submit.html">Report Issue</a>
<a href="dashboard.html">Dashboard</a>

<button onclick="toggleMode()" class="mode-toggle">
🌙
</button>

</nav>

</header>

</header>


<section class="dashboard">

<h2>Community Complaint Dashboard</h2>

<br>

<div class="stats">

<div class="stat-card">
<h3 id="totalCount">0</h3>
<p>Total Complaints</p>
</div>

<div class="stat-card">
<h3 id="pendingCount">0</h3>
<p>Pending</p>
</div>

<div class="stat-card">
<h3 id="resolvedCount">0</h3>
<p>Resolved</p>
</div>

</div>


<br>


<input
type="text"
id="search"
placeholder="Search complaints..."
class="search-bar"
onkeyup="searchComplaints()">


<br><br>


<div id="complaints" class="grid"></div>

</section>


<script>
    const btn = document.getElementById("modeBtn")

function toggleMode(){

document.body.classList.toggle("light")

if(document.body.classList.contains("light")){
btn.innerHTML="☀"
localStorage.setItem("theme","light")
}else{
btn.innerHTML="🌙"
localStorage.setItem("theme","dark")
}

}


let allComplaints = []


async function loadComplaints(){

try{

const res = await fetch("http://localhost:5000/api/complaints")

const data = await res.json()

allComplaints = data

updateStats(data)

renderComplaints(data)

}catch(err){

console.log(err)

}

}



function updateStats(data){

let total = data.length
let pending = data.filter(c => c.status === "Pending").length
let resolved = data.filter(c => c.status === "Resolved").length

document.getElementById("totalCount").innerText = total
document.getElementById("pendingCount").innerText = pending
document.getElementById("resolvedCount").innerText = resolved

}



function renderComplaints(list){

const container = document.getElementById("complaints")

container.innerHTML = ""

if(list.length === 0){

container.innerHTML = `
<div class="no-data">

<h3>No complaints yet</h3>

<a href="submit.html">
<button class="primary-btn">Report Complaint</button>
</a>

</div>
`

return

}


list.forEach(c=>{

const statusColor = c.status === "Resolved"
? "status-resolved"
: "status-pending"

const card = document.createElement("div")

card.className = "complaint-card"

card.innerHTML = `

<h3>${c.title}</h3>

<p>${c.description}</p>

<p><b>Location:</b> ${c.location}</p>

<span class="status ${statusColor}">
${c.status}
</span>

${c.media ? `<img src="http://localhost:5000/uploads/${c.media}">` : ""}

`

container.appendChild(card)

})

}



function searchComplaints(){

const keyword = document.getElementById("search").value.toLowerCase()

const filtered = allComplaints.filter(c =>

c.title.toLowerCase().includes(keyword) ||
c.description.toLowerCase().includes(keyword) ||
c.location.toLowerCase().includes(keyword)

)

renderComplaints(filtered)

}



loadComplaints()

</script>
<script src="js/app.js"></script>
</body>

</html>
