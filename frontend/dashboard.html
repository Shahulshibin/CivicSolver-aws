<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:radial-gradient(circle at top,#1a0033,#000);
color:white;
}

.card{
background:rgba(255,255,255,0.04);
border-radius:16px;
padding:20px;
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 0 25px #7c3aed;
}
.navlink{
transition:0.3s;
padding:6px 12px;
border-radius:6px;
}

.navlink:hover{
color:#c084fc;
background:rgba(139,92,246,0.1);
box-shadow:0 0 10px #8b5cf6;
}
.navlink{
transition:0.3s;
padding:6px 12px;
border-radius:6px;
}

.navlink:hover{
color:#c084fc;
background:rgba(139,92,246,0.1);
box-shadow:0 0 10px #8b5cf6;
}
</style>

</head>

<body>
    <!-- NAVBAR -->

<nav class="flex justify-between items-center px-8 py-4 border-b border-gray-800">

<h1 class="text-xl font-bold text-violet-400">
<a href="index.html">CivicTrack</a>
</h1>

<div class="space-x-6">

<a href="index.html" class="navlink">Home</a>

<a href="submit.html" class="navlink">Report Issue</a>

<a href="dashboard.html" class="navlink">Dashboard</a>
<button onclick="history.back()" 
class="ml-6 mt-4 text-violet-400 hover:text-violet-200">

← Back

</button>
</div>

</nav>

<h1 class="text-4xl text-center mt-10 text-violet-400 font-bold">
Complaint Dashboard
</h1>

<div id="complaints" class="grid md:grid-cols-3 gap-6 p-12">

<div class="text-center text-gray-400 col-span-3">

<p>No complaints yet</p>

<p class="text-sm mt-2">
Submit a complaint to see it appear here.
</p>

</div>

</div>

<script>

async function loadComplaints(){

try{

const res=await fetch("http://localhost:5000/api/complaints")

const data=await res.json()

const container=document.getElementById("complaints")

container.innerHTML=""

if(data.length===0){

container.innerHTML=`
<div class="text-center text-gray-400 col-span-3">
No complaints found
</div>
`

return
}

data.forEach(c=>{

container.innerHTML+=`

<div class="card">

<h3 class="text-xl text-violet-400 mb-2">
${c.title}
</h3>

<p class="text-gray-300">
${c.description}
</p>

<p class="text-sm text-gray-500 mt-2">
${c.location}
</p>

<span class="text-green-400 text-sm">
${c.status}
</span>

</div>

`

})

}catch(err){

console.log(err)

}

}

loadComplaints()

</script>

</body>
</html>
