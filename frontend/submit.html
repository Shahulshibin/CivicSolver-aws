<!DOCTYPE html>
<html>

<head>

<title>Report Issue</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="navbar">

<div class="logo">CivicTrack</div>

<header class="navbar">



<nav>

<a href="index.html">Home</a>
<a href="submit.html">Report Issue</a>
<a href="dashboard.html">Dashboard</a>

<button onclick="toggleMode()" class="mode-toggle">
🌙

</button>

</nav>

</header>

</header>


<div class="form-wrapper">

<div class="form-card">

<h2>Report Civic Issue</h2>

<br>

<label>Issue Title</label>
<input id="title" placeholder="Example: Broken streetlight">

<br><br>

<label>Description</label>
<textarea id="description" rows="4"
placeholder="Describe the problem"></textarea>

<br><br>

<label>Location</label>

<div class="location-row">

<input id="location" placeholder="City or coordinates">

<button onclick="detectLocation()" class="secondary-btn">
Detect
</button>

</div>

<br><br>

<label>Upload Image / Video</label>
<input type="file" id="file">

<br><br>

<button onclick="submitComplaint()" class="primary-btn submit-btn">
Submit Complaint
</button>

</div>

</div>


<script>

function toggleMode(){

document.body.classList.toggle("light")

if(document.body.classList.contains("light")){

localStorage.setItem("theme","light")

}else{

localStorage.setItem("theme","dark")

}

}




function detectLocation(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(pos){

const lat = pos.coords.latitude
const lon = pos.coords.longitude

document.getElementById("location").value =
lat + "," + lon

})

}

}



async function submitComplaint(){

const title = document.getElementById("title").value
const description = document.getElementById("description").value
const location = document.getElementById("location").value
const file = document.getElementById("file").files[0]

if(!title || !description){

alert("Please fill all required fields")

return

}

const formData = new FormData()

formData.append("title",title)
formData.append("description",description)
formData.append("location",location)

if(file){

formData.append("file",file)

}

try{

const res = await fetch("http://localhost:5000/api/complaints",{

method:"POST",
body:formData

})

const data = await res.json()

alert("Complaint Submitted Successfully")

window.location.href="dashboard.html"

}catch(err){

alert("Error submitting complaint")

}

}

</script>
<script src="js/app.js"></script>
</body>

</html>
